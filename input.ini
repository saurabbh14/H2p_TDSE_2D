&R_grid
NR=512          ! NR = number of grid points
Rmin=0.1       ! Rmin = grid minimum (positive) in 10^-10 m.
Rmax=51.2      ! Rmax = grid maximum in 10^-10 m    
/
&x_grid
Nx=1024          ! Nx = number of grid points
xmin=-102.4       ! xmin = grid minimum (positive) in 
xmax=102.4      ! xmax = grid maximum in 10^-10 m    
/
&nucl_masses
m1=1.0
m2=1.0           ! m1=mass of H, m2=mass of H
/
&time_grid
dt=0.05         ! dt           = time step in au.
Nt=25000         ! Nt           = Number of time steps.
/
&elec_states
Nstates=2        ! Nstates      = Number of calculated electronic states.
sc_kind= "on_grid" ! potential kind: "on_grid" (provide input file below) | "static" 
bo_pot_kind= "on_nuclr_grid" ! potential kind: "on_nuclr_grid" (provide input file below) | "Morse" 
/
&input_files
!---- input files ----!
input_data_dir = "input_data/"
adb_pot="H2+_BO.dat"
trans_dip_prefix=""
/
&output_files
!---- output files ----!
output_data_dir = "output_data/"
/
&softcore_params
sc_params="Z_interpolated_optimized_a2_parameters_with_go.txt"
CalcMode = "Lab"  ! options: "Lab" | "KH" (cycle-averaged static) | "KH_td" (time-dependent KH propagation)
/
&vib_states
guess_vstates=100       ! Vstates      = Number of calculated excited states.
/
&ini_guess_wf
RI=0.7           ! RI          = center of initial Gaussian in 10^-10 m.
kappa=-5.0       ! kappa        =  width of initial Gaussian in 10^-10 m. (has to be negative)
/
&laser_param
!---- field #1 ----!
envelope_shape_laser1="sin2"	! envelope shape options: "cos2" | "sin2" | "gaussian" | "trapezoidal"
lambda1=228     ! nm
tp1=8.          ! fs
t_mid1=15.      ! fs
alpha01=2.5         ! quiver amplitude (a.u.)
phi1=0.0         ! phase in pi
rise_time1=4.    ! rise time of the trapezoidal pulse. Note: only need to be initialized for trapezoidal pulses 
!---- field #2 ----!
envelope_shape_laser2="trapezoidal"	! envelope shape options: "cos2" | "sin2" | "gaussian" | "trapezoidal"
lambda2=800      ! nm
tp2=0.           ! fs
t_mid2= 0.       ! fs
alpha02=0.0          ! quiver amplitude (a.u.)
phi2=0.0         ! phase in pi
rise_time2=0.     ! rise time(fs) of the trapezoidal pulse. Note: only need to be initialized for trapezoidal pulses 
/
&trans_dip_off
!---- Switching off trans dip ----!
total_trans_off=0
trans_off=""
/
&absorber_choice
!---- Choice of the absorber ----!
absorber="mask"     ! Absorber options: "mask" | "CAP"
/
&ini_state
!---- Initial state of TDSE ----!
initial_distribution = "single vibrational state" 
!!! options: "single vibrational state"| "gaussian distribution" | "Boltzmann distribution"
!!! options: "" 
N_ini = 1          ! initial electronic state(s)
v_ini = 1          ! initial vibrational state
RI_tdse = 1.5      ! Gaussian distribution centered around in Angstrom (10^-10 m)
kappa_tdse = -5.0  ! standard deviation of Gaussian distribution
/
&parallelization
!---- FFTW parallization -------!
prop_par_FFTW = "parallel"   ! TDSE FFTW parallel options: "parallel" | ""
ITP_par_FFTW = ""    ! Imaginary Time Prop (ITP) FFTW parallel options: "parallel" | ""
/
&openmp_threads
!---- Openmp threads -----------!
omp_nthreads = 0  ! 0 = max number of threads available | any other integer > 0 
/
&propagation_method
!---- Propagation method -------!
propagator_method = "split_operator"  ! options: "split_operator" | "rk4"
/
&gauge_choice
gauge_2d = "length"
/

